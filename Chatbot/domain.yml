entities:
  - company
  - prep_area

slots:
  company:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: company

  prep_area:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: prep_area
  
  student_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  
  last_company_asked:
    type: text
    influence_conversation: false
    mappings:
      - type: custom


responses:
  utter_greet:
    - text: "Hi! I'm EduPlus PlaceMate AI.\nAsk me about:\n- Company packages, eligibility, skills\n- Aggregate queries (e.g., 'List Tier-1 companies')\n- Placement rules and preparation tips"

  utter_thank_you:
    - text: "You're welcome! Feel free to ask more questions."

  utter_goodbye:
    - text: "Goodbye! Best of luck with placements!"

  utter_default:
    - text: "I didn't understand that. Try asking about:\n- Specific company (e.g., 'Google package')\n- Aggregate query (e.g., 'List Tier-1 companies')\n- Placement policy (e.g., 'Placement rules')"
  
  utter_ask_company_clarification:
    - text: "Please specify which company you are asking about."

  # Layer 3: Static Policy Responses
  utter_placement_rules:
    - text: "Placement Rules:\n- 75% Attendance Mandatory\n- No Active Backlogs for Tier-1 Companies\n- Formal Attire Required for Interviews\n- One Offer Per Student (Dream/Super Dream Policy)"

  utter_backlog_rules:
    - text: "Backlog Policy:\n- Tier-1 Companies: 0 Backlogs Required\n- Tier-2 Companies: Maximum 1 Backlog Allowed\n- Tier-3 Companies: Maximum 2 Dead Backlogs Allowed\n- Active backlogs disqualify from most companies"

  utter_training_schedule:
    - text: "Training Schedule:\n- Days: Monday to Friday\n- Time: 5:00 PM - 7:00 PM\n- Topics: Data Structures & Algorithms, Aptitude, Communication Skills\n- Duration: 3 months before placement season"

  utter_internship_policy:
    - text: "Internship Policy:\n- Many Tier-1 and Tier-2 companies offer 2-3 month summer internships\n- PPO (Pre-Placement Offer) is possible based on internship performance\n- Internship CTC is typically 50-70% of full-time package\n- Some companies hire only through PPO route"

  utter_company_tiers_explained:
    - text: "Company Tier Classification:\n\nTier-1 (Product-Based):\n- High packages (10+ LPA)\n- Strong technical focus (DSA, System Design)\n- Examples: Google, Amazon, Microsoft, Flipkart\n\nTier-2 (Hybrid):\n- Moderate packages (6-10 LPA)\n- Mix of product and service\n- Examples: IBM, Accenture, Cognizant\n\nTier-3 (Service-Based):\n- Mass hiring (4-6 LPA)\n- Focus on aptitude and basics\n- Examples: TCS, Infosys, Wipro"

  utter_general_preparation:
    - text: "Placement Preparation Strategy:\n\n1. Technical Skills:\n   - Master DSA (Arrays, Strings, Trees, Graphs, DP)\n   - Practice on LeetCode, GeeksforGeeks\n   - Build 2-3 strong projects\n\n2. Core Subjects:\n   - DBMS, OS, OOPS, Computer Networks\n   - Revise theory + practice MCQs\n\n3. Aptitude:\n   - Quantitative, Logical, Verbal\n   - Practice daily (IndiaBix, PrepInsta)\n\n4. Soft Skills:\n   - Communication, Resume building\n   - Mock interviews\n\nStart 6 months before placement season!"

  utter_general_hr_question:
    - text: "HR Interview Preparation Tips:\n- Be ready with 'Tell me about yourself'.\n- Research the company's values and mission.\n- Use the STAR method (Situation, Task, Action, Result) for behavioral questions.\n- Common questions: Strengths/Weaknesses, Why should we hire you? Where do you see yourself in 5 years?\n- Dress formally and maintain good body language."

